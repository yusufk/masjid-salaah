<div id="mbl-salaah"></div>
<script>
fetch('https://masjid-salaah-api.yusufk.workers.dev/?id=greenside-rahmah')
.then(r=>r.json()).then(res=>{
const d=res.data,now=new Date(),mins=now.getHours()*60+now.getMinutes();
const toM=s=>{const[h,n]=s.split(':').map(Number);return h*60+n};
const t=[d.fajrJamaah,d.dhuhrJamaah,d.asrJamaah,d.maghribJamaah,d.eshaJamaah];
let nx=t.findIndex(x=>toM(x)>mins);if(nx<0)nx=0;
const c='border:1px solid #84e8ff;';
const row=(i,name,ath,jam)=>`<tr style="${i===nx?'background:rgba(132,232,255,.15)':''}"><td style="color:#a0fa94;font-weight:700;padding:8px 10px;background:rgba(0,80,100,.5);${c}">${name}</td><td style="text-align:center;color:#84e8ff;padding:8px 10px;background:rgba(0,80,100,.5);${c}">${ath}</td><td style="text-align:center;color:#84e8ff;font-weight:700;padding:8px 10px;background:rgba(0,80,100,.5);${c}">${jam}</td></tr>`;
const isFri=now.getDay()===5;
document.getElementById('mbl-salaah').innerHTML=`
<table style="width:100%;border-collapse:collapse;background:#005d71;border-radius:6px;overflow:hidden;font-family:sans-serif;font-size:15px;border:1px solid #84e8ff">
<thead><tr><td style="padding:8px 10px;background:#005d71;color:#fff;font-size:12px;font-weight:700;${c}"></td><td style="text-align:center;background:#005d71;color:#fff;font-size:12px;font-weight:700;padding:8px;${c}">Adhān</td><td style="text-align:center;background:#005d71;color:#fff;font-size:12px;font-weight:700;padding:8px;${c}">Jamaat</td></tr></thead>
<tbody>
${row(0,'Fajr',d.fajrAthan,d.fajrJamaah)}
${row(1,'Zuhr',d.dhuhrAthan,d.dhuhrJamaah)}
${d.jumuahTime1?`<tr style="${isFri?'background:rgba(132,232,255,.15)':''}"><td style="color:#a0fa94;font-weight:700;padding:8px 10px;background:rgba(0,80,100,.5);${c}">Jumu'ah</td><td style="text-align:center;color:#84e8ff;padding:8px 10px;background:rgba(0,80,100,.5);${c}">${d.jumuahTime1}</td><td style="text-align:center;color:#84e8ff;font-weight:700;padding:8px 10px;background:rgba(0,80,100,.5);${c}">${d.jumuahTime3||''}</td></tr>`:''}
${row(2,"'Asr",d.asrAthan,d.asrJamaah)}
${row(3,'Maghrib',d.maghribAthan,d.maghribJamaah)}
${row(4,"'Ishā",d.eshaAthan,d.eshaJamaah)}
</tbody>
<tfoot><tr><td colspan="3" style="padding:8px 10px;font-size:12px;color:rgba(255,255,255,.7);text-align:center;background:#005d71;${c}">Sunrise <strong style="color:#84e8ff">${d.sunrise}</strong> · Sunset <strong style="color:#84e8ff">${d.sunset}</strong></td></tr></tfoot>
</table>`;
}).catch(()=>{document.getElementById('mbl-salaah').innerHTML='<p style="color:red;text-align:center">Unable to load times</p>'});
</script>
