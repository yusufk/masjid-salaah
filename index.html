<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salaah Times - Masjid ur Rahmah</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body, .sw { font-family: 'Segoe UI', -apple-system, sans-serif; background: #005d71; color: #fff; }
.sw { max-width: 420px; margin: 0 auto; padding: 1.2rem; }
.sw-header { text-align: center; margin-bottom: 1rem; }
.sw-header h2 { font-size: 1.3rem; color: #84e8ff; font-weight: 700; }
.sw-header .sw-sub { font-size: 0.8rem; color: #a0fa94; margin-top: 0.2rem; }
.sw-date { display: flex; justify-content: space-between; font-size: 0.75rem; color: #ccc; margin-bottom: 0.5rem; padding: 0 0.2rem; }
.sw table { width: 100%; border-collapse: collapse; border: 2px solid #84e8ff; }
.sw th { background: #005d71; color: #fff; font-size: 0.9rem; padding: 0.6rem 0.5rem; border-bottom: 2px solid #84e8ff; }
.sw th:first-child { text-align: left; }
.sw th:not(:first-child) { text-align: center; }
.sw td { padding: 0.7rem 0.5rem; font-size: 1.05rem; font-weight: 600; border-bottom: 1px solid rgba(132,232,255,0.25); background: rgba(0,80,100,0.5); }
.sw td:first-child { color: #a0fa94; font-weight: 700; font-size: 1.1rem; }
.sw td:not(:first-child) { text-align: center; color: #84e8ff; }
.sw tr.nx td { background: rgba(132,232,255,0.12); }
.sw tr.nx td:first-child { color: #fff; }
.sw-jumuah { margin-top: 0.75rem; padding: 0.5rem; background: rgba(0,80,100,0.6); border: 1px solid rgba(132,232,255,0.3); border-radius: 0.4rem; font-size: 0.85rem; text-align: center; color: #84e8ff; }
.sw-jumuah strong { color: #a0fa94; }
.sw-footer { margin-top: 0.6rem; text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.5); }
.sw-loading { text-align: center; padding: 2rem; color: #84e8ff; }
</style>
</head>
<body>
<div class="sw" id="sw">
  <div class="sw-loading">Loading salaah times...</div>
</div>
<script>
(function() {
  const API = 'https://masjid-salaah-api.yusufk.workers.dev/?id=greenside-rahmah';
  const widget = document.getElementById('sw');

  fetch(API)
    .then(r => r.json()).then(res => {
      if (!res.ok || !res.data) throw new Error('No data');
      const d = res.data, m = d.meta || {};
      const now = new Date();
      const mins = now.getHours() * 60 + now.getMinutes();
      const toM = s => { const [h,n] = s.split(':').map(Number); return h*60+n; };
      const times = [d.fajrJamaah, d.dhuhrJamaah, d.asrJamaah, d.maghribJamaah, d.eshaJamaah];
      let nx = times.findIndex(t => toM(t) > mins);
      if (nx < 0) nx = 0;

      const dateStr = now.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });

      widget.innerHTML = `
        <div class="sw-header">
          <h2>${m.city || 'Greenside'}<br>${m.masjid || 'Masjid ur Rahmah'}</h2>
        </div>
        <div class="sw-date"><span>${dateStr}</span></div>
        <table>
          <thead><tr><th></th><th>Adhān</th><th>Salāh</th></tr></thead>
          <tbody>
            <tr class="${nx===0?'nx':''}"><td>Fajr</td><td>${d.fajrAthan}</td><td>${d.fajrJamaah}</td></tr>
            <tr class="${nx===1?'nx':''}"><td><u>Z</u>uhr</td><td>${d.dhuhrAthan}</td><td>${d.dhuhrJamaah}</td></tr>
            <tr class="${nx===2?'nx':''}"><td>'A<u>s</u>r</td><td>${d.asrAthan}</td><td>${d.asrJamaah}</td></tr>
            <tr class="${nx===3?'nx':''}"><td>Maghrib</td><td>${d.maghribAthan}</td><td>${d.maghribJamaah}</td></tr>
            <tr class="${nx===4?'nx':''}"><td>'Ishā</td><td>${d.eshaAthan}</td><td>${d.eshaJamaah}</td></tr>
          </tbody>
        </table>
        ${d.jumuahTime1 ? `<div class="sw-jumuah">Jumu'ah: <strong>${d.jumuahTime1}</strong>${d.jumuahTime3 ? ' & <strong>'+d.jumuahTime3+'</strong>' : ''}</div>` : ''}
        <div class="sw-footer">Sunrise ${d.sunrise} · Sunset ${d.sunset}</div>
      `;
    })
    .catch(() => {
      widget.innerHTML = '<div class="sw-loading" style="color:#ef5350">Unable to load salaah times</div>';
    });
})();
</script>
</body>
</html>
