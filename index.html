<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salaah Times - Masjid ur Rahmah</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body, .salaah-widget { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }
.salaah-widget { max-width: 400px; margin: 0 auto; padding: 1rem; }
.sw-header { text-align: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sw-header h2 { font-size: 1.1rem; color: #4ecdc4; margin-bottom: 0.25rem; }
.sw-header .sw-sub { font-size: 0.75rem; color: #888; }
.sw-table { width: 100%; border-collapse: collapse; }
.sw-table th { font-size: 0.65rem; text-transform: uppercase; color: #4ecdc4; padding: 0.4rem 0.3rem; text-align: left; letter-spacing: 0.05em; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sw-table th:not(:first-child) { text-align: center; }
.sw-table td { padding: 0.5rem 0.3rem; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
.sw-table td:not(:first-child) { text-align: center; font-variant-numeric: tabular-nums; }
.sw-table tr.sw-next { background: rgba(78,205,196,0.1); }
.sw-table tr.sw-next td:first-child { font-weight: 600; color: #4ecdc4; }
.sw-salaah-name { font-weight: 500; }
.sw-jumuah { margin-top: 0.75rem; padding: 0.5rem; background: rgba(78,205,196,0.08); border-radius: 0.4rem; font-size: 0.8rem; text-align: center; color: #aaa; }
.sw-jumuah strong { color: #4ecdc4; }
.sw-footer { margin-top: 0.75rem; text-align: center; font-size: 0.65rem; color: #555; }
.sw-loading { text-align: center; padding: 2rem; color: #666; }
.sw-error { text-align: center; padding: 1rem; color: #ef5350; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="salaah-widget" id="salaah-widget">
  <div class="sw-loading">Loading salaah times...</div>
</div>
<script>
(function() {
  const API = 'https://masjid-salaah-api.yusufk.workers.dev/?id=greenside-rahmah';
  const widget = document.getElementById('salaah-widget');

  fetch(API)
    .then(r => r.json())
    .then(res => {
      if (!res.ok || !res.data) throw new Error('No data');
      const d = res.data;
      const meta = d.meta || {};

      // Determine which prayer is next
      const now = new Date();
      const mins = now.getHours() * 60 + now.getMinutes();
      const times = [
        { name: 'Fajr', jamaat: d.fajrJamaah },
        { name: 'Zuhr', jamaat: d.dhuhrJamaah },
        { name: 'Asr', jamaat: d.asrJamaah },
        { name: 'Maghrib', jamaat: d.maghribJamaah },
        { name: 'Esha', jamaat: d.eshaJamaah }
      ];
      const toMins = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
      let nextIdx = times.findIndex(t => toMins(t.jamaat) > mins);
      if (nextIdx === -1) nextIdx = 0;

      widget.innerHTML = `
        <div class="sw-header">
          <h2>${meta.masjid || 'Masjid ur Rahmah'}</h2>
          <div class="sw-sub">${meta.city || 'Greenside'}, Johannesburg</div>
        </div>
        <table class="sw-table">
          <thead><tr><th>Salaah</th><th>Adhaan</th><th>Jamaat</th></tr></thead>
          <tbody>
            <tr class="${nextIdx===0?'sw-next':''}"><td class="sw-salaah-name">Fajr</td><td>${d.fajrAthan||d.fajrStarts}</td><td>${d.fajrJamaah}</td></tr>
            <tr class="${nextIdx===1?'sw-next':''}"><td class="sw-salaah-name">Zuhr</td><td>${d.dhuhrAthan}</td><td>${d.dhuhrJamaah}</td></tr>
            <tr class="${nextIdx===2?'sw-next':''}"><td class="sw-salaah-name">Asr</td><td>${d.asrAthan}</td><td>${d.asrJamaah}</td></tr>
            <tr class="${nextIdx===3?'sw-next':''}"><td class="sw-salaah-name">Maghrib</td><td>${d.maghribAthan}</td><td>${d.maghribJamaah}</td></tr>
            <tr class="${nextIdx===4?'sw-next':''}"><td class="sw-salaah-name">Esha</td><td>${d.eshaAthan}</td><td>${d.eshaJamaah}</td></tr>
          </tbody>
        </table>
        ${d.jumuahTime1 ? `<div class="sw-jumuah">Jumu'ah: <strong>${d.jumuahTime1}</strong>${d.jumuahTime3 ? ' & <strong>'+d.jumuahTime3+'</strong>':''}</div>` : ''}
        <div class="sw-footer">
          Sunrise ${d.sunrise} · Sunset ${d.sunset}<br>
          Updated: ${d.last_updated || '—'}
        </div>
      `;
    })
    .catch(e => {
      widget.innerHTML = '<div class="sw-error">Unable to load salaah times. Please try again later.</div>';
      console.error('Salaah widget error:', e);
    });
})();
</script>
</body>
</html>
